name: finance-manager-dev

services:
  app:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
      args:
        RUBY_VERSION: ${RUBY_VERSION:-3.4.10}
        BUNDLER_VERSION: ${BUNDLER_VERSION:-2.7.2}
        RAILS_VERSION: ${RAILS_VERSION:-8.1.3}
        USER_UID: ${LOCAL_UID:-1000}
        USER_GID: ${LOCAL_GID:-1000}
    init: true
    command: sleep infinity
    depends_on:
      db:
        condition: service_healthy
    environment:
      BUNDLE_PATH: /usr/local/bundle
      DATABASE_HOST: db
      DATABASE_PORT: "5432"
      DATABASE_USERNAME: ${POSTGRES_USER:-app}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-development_only}
      DATABASE_NAME: ${DATABASE_NAME:-company_finance_development}
      DATABASE_TEST_NAME: ${DATABASE_TEST_NAME:-company_finance_test}
      RAILS_VERSION: ${RAILS_VERSION:-8.1.3}
      RUBY_VERSION: ${RUBY_VERSION:-3.4.10}
      BUNDLER_VERSION: ${BUNDLER_VERSION:-2.7.2}
    volumes:
      - ..:/workspace/finance-manager:cached
      - bundle_cache:/usr/local/bundle

  db:
    image: ${POSTGRES_IMAGE:-postgres:17.10-bookworm}
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-development_only}
      POSTGRES_DB: ${POSTGRES_DB:-company_finance_development}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 2s
      timeout: 5s
      retries: 15
      start_period: 5s
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  bundle_cache:
  postgres_data:
