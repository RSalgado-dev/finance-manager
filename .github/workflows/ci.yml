name: CI

"on":
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      COMPOSE_PROJECT_NAME: company_finance_ci

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Match container user to runner
        run: |
          echo "LOCAL_UID=$(id -u)" >> "$GITHUB_ENV"
          echo "LOCAL_GID=$(id -g)" >> "$GITHUB_ENV"

      - name: Validate Compose configuration
        run: docker compose -f .devcontainer/compose.yaml config

      - name: Build application image
        run: docker compose -f .devcontainer/compose.yaml build app

      - name: Start clean PostgreSQL service
        run: docker compose -f .devcontainer/compose.yaml up -d --wait db

      - name: Run project CI
        run: docker compose -f .devcontainer/compose.yaml run --rm --no-TTY app bin/ci

      - name: Clean up containers and volumes
        if: ${{ always() }}
        run: docker compose -f .devcontainer/compose.yaml down --volumes --remove-orphans
