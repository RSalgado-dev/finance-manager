pt-BR:
  errors:
    format: "%{attribute} %{message}"
    messages:
      blank: "não pode ficar em branco"
  date:
    formats:
      default: "%d/%m/%Y"
      short: "%d/%m"
      long: "%d de %B de %Y"
  time:
    formats:
      default: "%d/%m/%Y %H:%M"
      short: "%d/%m %H:%M"
      long: "%d de %B de %Y às %H:%M"
  number:
    currency:
      format:
        unit: "R$"
        delimiter: "."
        separator: ","
        precision: 2
        format: "%u %n"
